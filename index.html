<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Are You Kaddu?</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .question {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(2rem, 7vw, 4rem);
            color: #1a1a2e;
            margin-bottom: 2.5rem;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            line-height: 1.2;
            padding: 0 10px;
        }

        .question.changed {
            color: #2d6a4f;
            transform: scale(1.05);
        }

        /* Meme Image Styles */
        .meme-container {
            margin-top: 2rem;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
            display: none;
        }

        .meme-container.show {
            opacity: 1;
            transform: scale(1);
            display: block;
        }

        .meme-image {
            max-width: 90%;
            width: 400px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            /* Ensures image doesn't exceed screen height on small mobiles */
            max-height: 50vh;
            object-fit: contain;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 80px;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.9rem 2.5rem;
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }

        @media (max-width: 480px) {
            .btn {
                padding: 0.8rem 2rem;
                font-size: 1.1rem;
            }
            .buttons {
                gap: 1rem;
            }
            .question {
                margin-bottom: 1.5rem;
            }
        }

        .btn:focus-visible {
            outline: 3px solid #1a1a2e;
            outline-offset: 3px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #40916c 0%, #2d6a4f 100%);
            color: white;
            box-shadow: 0 5px 0 #1b4332, 0 8px 20px rgba(45, 106, 79, 0.3);
        }

        .btn-yes:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #1b4332, 0 10px 25px rgba(45, 106, 79, 0.4);
        }

        .btn-yes:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #1b4332, 0 4px 10px rgba(45, 106, 79, 0.2);
        }

        .btn-no {
            background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
            color: white;
            box-shadow: 0 5px 0 #780000, 0 8px 20px rgba(193, 18, 31, 0.3);
            position: absolute;
            transition: transform 0.15s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 5;
            touch-action: none;
        }

        .btn-no.jelly {
            animation: jelly 0.5s ease;
        }

        @keyframes jelly {
            0% { transform: scale(1, 1) translate(var(--tx), var(--ty)); }
            25% { transform: scale(0.9, 1.1) translate(var(--tx), var(--ty)); }
            50% { transform: scale(1.1, 0.9) translate(var(--tx), var(--ty)); }
            75% { transform: scale(0.95, 1.05) translate(var(--tx), var(--ty)); }
            100% { transform: scale(1, 1) translate(var(--tx), var(--ty)); }
        }

        .btn-no.dodge {
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-no.hidden {
            opacity: 0;
            transform: scale(0) !important;
            pointer-events: none;
        }

        .shadow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(45, 106, 79, 0.05) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 100;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="shadow-circle"></div>
    
    <div class="container">
        <h1 class="question" id="question">Are You Kaddu?</h1>
        
        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn" aria-label="Yes button">Yes</button>
            <button class="btn btn-no" id="noBtn" aria-label="No button - it dodges!">No</button>
        </div>

        <div class="meme-container" id="memeContainer">
            <!-- Using the image URL provided in the prompt -->
            <img src="https://z-cdn-media.chatglm.cn/files/b4b390d7-4e96-4979-b562-5851fd8c316d.png?auth_key=1872608729-981bc6324b1e406c9261b3aca8e96c5c-0-9c44b2710e83f75b363895981d78e26e" alt="Surprised Cat" class="meme-image">
        </div>
    </div>

    <script>
        const question = document.getElementById('question');
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const memeContainer = document.getElementById('memeContainer');
        
        let isYesPressed = false;
        let dodgeCount = 0;
        
        const dodgeMessages = [
            "No", "Nice try!", "Too slow!", "Catch me!", "Nope!", 
            "Almost!", "Keep trying!", "Not today!", "So close!", "Never!"
        ];

        function positionNoButton() {
            if (isYesPressed) return;
            const rect = yesBtn.getBoundingClientRect();
            noBtn.style.position = 'fixed';
            noBtn.style.left = (rect.right + 20) + 'px';
            noBtn.style.top = rect.top + 'px';
            noBtn.style.transform = 'none';
        }
        
        setTimeout(positionNoButton, 100);
        window.addEventListener('resize', positionNoButton);
        window.addEventListener('scroll', positionNoButton);

        noBtn.addEventListener('mouseenter', dodgeButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dodgeButton();
        }, { passive: false });

        function dodgeButton() {
            if (isYesPressed) return;

            const btnRect = noBtn.getBoundingClientRect();
            const btnWidth = btnRect.width;
            const btnHeight = btnRect.height;
            
            const safeWidth = window.innerWidth - btnWidth - 20;
            const safeHeight = window.innerHeight - btnHeight - 20;

            let newX = Math.random() * safeWidth;
            let newY = Math.random() * safeHeight;

            newX = Math.max(10, Math.min(newX, safeWidth));
            newY = Math.max(10, Math.min(newY, safeHeight));
            
            noBtn.classList.remove('jelly');
            void noBtn.offsetWidth;
            noBtn.classList.add('jelly');

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';

            dodgeCount++;
            if (dodgeCount < dodgeMessages.length) {
                noBtn.textContent = dodgeMessages[dodgeCount];
            } else {
                noBtn.textContent = dodgeMessages[(dodgeCount - dodgeMessages.length) % (dodgeMessages.length - 1) + 1];
            }
        }

        yesBtn.addEventListener('click', () => {
            if (isYesPressed) return;
            isYesPressed = true;

            question.textContent = "Yes Bhawna You Are Kaddu Too";
            question.classList.add('changed');

            noBtn.classList.add('hidden');

            memeContainer.classList.add('show');

            createConfetti();
        });

        function createConfetti() {
            const colors = ['#40916c', '#2d6a4f', '#ffd166', '#ef476f', '#118ab2'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * window.innerWidth + 'px';
                    confetti.style.top = '-20px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    document.body.appendChild(confetti);

                    const duration = 2000 + Math.random() * 2000;
                    const xEnd = (Math.random() - 0.5) * 300;
                    
                    confetti.animate([
                        { transform: `translateY(0) translateX(0) rotate(0deg)`, opacity: 1 },
                        { transform: `translateY(${window.innerHeight + 100}px) translateX(${xEnd}px) rotate(${720 + Math.random() * 360}deg)`, opacity: 0 }
                    ], {
                        duration: duration,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    });

                    setTimeout(() => confetti.remove(), duration);
                }, i * 30);
            }
        }
    </script>
</body>
</html>
